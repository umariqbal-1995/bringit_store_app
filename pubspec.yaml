name: bringit_store_app
description: "BringIt Store App - Merchant portal for managing orders, products and riders."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.4.0
  get_storage: ^2.1.1
  pinput: ^3.0.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  firebase_core: ^3.13.0
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
